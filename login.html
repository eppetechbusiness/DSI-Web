<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login | Digital Sovereignty Institute</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="auth-section">
  <div class="container">
    <div class="auth-box">
      <div class="tag">Member Portal</div>
      <h2>Welcome Back</h2>
      <p>Sign in to access your member dashboard and exclusive content.</p>
      <form class="auth-form" id="loginForm">
        <div class="form-group"><label>Email Address</label><input type="email" placeholder="your@email.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" placeholder="Your password" required></div>
        <button type="submit" class="btn btn-navy" style="width:100%;">Sign In</button>
      </form>
      <div class="auth-switch">Not a member? <a href="membership.html">Join for free</a></div>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="js/components.js"></script><script src="js/main.js"></script>
</body></html>
